<html>
    <br> <br> <br>
    <h2> This part does like a sum thing of two numbers</h>

    <button onclick="computesum()">Add 2 Numbers</button><br>
    
    
    <br><br>
    <label id="sumlabel">The sum of _ and _ is: </label>
    <input type="number" id="sum" readonly></input>


    <script>
        function computesum()
        {
            let a='',b='';
            a = prompt('Type the first number.');
            b = prompt('Type the second number.');

            document.getElementById("sumlabel").innerHTML = "<label>The sum of "+a+" and "+b+" is: </label>";
            document.getElementById("sum").value = parseInt(a)+parseInt(b);
        }
    </script>
